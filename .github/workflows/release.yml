name: Release Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach installers to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.suffix }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            glob: app/desktopApp/build/compose/binaries/main/dmg/*.dmg
            suffix: macos
          - os: windows-latest
            task: packageMsi
            glob: app/desktopApp/build/compose/binaries/main/msi/*.msi
            suffix: windows
          - os: ubuntu-latest
            task: packageDeb
            glob: app/desktopApp/build/compose/binaries/main/deb/*.deb
            suffix: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: ./gradlew :app:desktopApp:${{ matrix.task }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          file=$(ls ${{ matrix.glob }} | head -1)
          echo "Uploading $file to $TAG"
          gh release upload "$TAG" "$file" --clobber
